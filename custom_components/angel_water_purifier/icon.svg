<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#1a73e8" opacity="0.1"/>
  <circle cx="128" cy="128" r="120" fill="none" stroke="#1a73e8" stroke-width="2"/>

  <!-- Pure water drop -->
  <path d="M130 30 C135 90 180 110 180 155 Q180 200 130 220 Q80 200 80 155 C80 110 125 90 130 30Z"
        fill="#4fc3f7" opacity="0.7"/>

  <!-- Wave lines in the drop -->
  <path d="M95 155 Q110 145 125 155 Q140 165 155 155 Q170 145 180 155"
        fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.5"/>
  <path d="M95 168 Q110 158 125 168 Q140 178 155 168 Q170 158 180 168"
        fill="none" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
  <path d="M95 181 Q110 171 125 181 Q140 191 155 181 Q170 171 180 181"
        fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>

  <!-- Filter indicator arc -->
  <path d="M70 70 Q128 30 186 70"
        fill="none" stroke="#1a73e8" stroke-width="6" stroke-linecap="round"
        stroke-dasharray="100 200" stroke-dashoffset="0" opacity="0.8"/>

  <!-- Filter icon -->
  <g transform="translate(128, 65)">
    <rect x="-12" y="-5" width="24" height="10" rx="3" fill="#1a73e8"/>
    <rect x="-8" y="-8" width="16" height="3" rx="1.5" fill="#1a73e8"/>
    <rect x="-8" y="5" width="16" height="3" rx="1.5" fill="#1a73e8"/>
  </g>

  <!-- Check mark (for purified water) -->
  <circle cx="185" cy="195" r="20" fill="#4caf50" opacity="0.9"/>
  <path d="M177 195 L183 203 L195 187" fill="none" stroke="white" stroke-width="3.5"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
